<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="ETCH">
  <!-- obsidian rounded-square background -->
  <rect width="64" height="64" rx="12" fill="#141009"/>
  <!-- subtle ember glow -->
  <radialGradient id="ember" cx="0.62" cy="0.36" r="0.6">
    <stop offset="0%" stop-color="#B8893F" stop-opacity="0.18"/>
    <stop offset="60%" stop-color="#B8893F" stop-opacity="0"/>
  </radialGradient>
  <rect width="64" height="64" rx="12" fill="url(#ember)"/>
  <!-- ETCH "E" mark — three brass crossbars + vertical stem -->
  <g fill="none" stroke="#DCB36A" stroke-linecap="round" stroke-width="4">
    <!-- vertical stem -->
    <line x1="18" y1="14" x2="18" y2="50"/>
    <!-- top crossbar -->
    <line x1="18" y1="14" x2="42" y2="14"/>
    <!-- middle crossbar (shorter) -->
    <line x1="18" y1="32" x2="36" y2="32"/>
    <!-- bottom crossbar -->
    <line x1="18" y1="50" x2="42" y2="50"/>
  </g>
  <!-- brass dot accent — the wordmark "." -->
  <circle cx="50" cy="50" r="3.2" fill="#DCB36A"/>
</svg>
