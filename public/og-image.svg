<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    ETCH OG share image — brand-aligned fallback.
    Replace with a 1200x630 JPG of real product photography when available.
    Most social platforms accept SVG og:image, but some (LinkedIn, older
    embeds) prefer raster. Save a PNG export of this as /og-image.jpg too
    when you ship real photography.
  -->
  <defs>
    <radialGradient id="ember" cx="32%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#3A2916" stop-opacity="1"/>
      <stop offset="46%" stop-color="#1C160E" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0D0A06" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DCB36A"/>
      <stop offset="100%" stop-color="#B8893F"/>
    </linearGradient>
  </defs>

  <!-- ember-bg fill -->
  <rect width="1200" height="630" fill="url(#ember)"/>

  <!-- contour engraving on the right -->
  <g stroke="#B8893F" stroke-width="1.2" fill="none" opacity=".5"
     transform="translate(740,55) scale(.9)">
    <path d="M0 0 L0 560" stroke-opacity=".25"/>
    <path d="M-120 60 C-80 30 80 30 120 60"/>
    <path d="M-140 130 C-90 90 90 90 140 130"/>
    <path d="M-150 200 C-95 160 95 160 150 200"/>
    <path d="M-152 278 C-95 238 95 238 152 278"/>
    <path d="M-150 356 C-92 315 92 315 150 356"/>
    <path d="M-142 430 C-88 390 88 390 142 430"/>
    <path d="M-126 500 C-80 468 80 468 126 500"/>
    <path d="M-100 560 C-65 538 65 538 100 560"/>
    <path d="M-75 165 C-90 215 -90 285 -75 351"/>
    <path d="M75 165 C90 215 90 285 75 351"/>
  </g>

  <!-- wordmark + tagline -->
  <g font-family="Archivo, system-ui, sans-serif" fill="#F6F1E7">
    <text x="92" y="282" font-size="120" font-weight="800" letter-spacing="-2">
      ETCH<tspan fill="url(#brass)">.</tspan>
    </text>
    <text x="92" y="356" font-size="44" font-weight="500" font-style="italic"
          font-family="Fraunces, Georgia, serif" fill="#DCB36A">
      Definition, engineered.
    </text>
  </g>

  <!-- eyebrow & footer commitments -->
  <g font-family="ui-monospace, 'IBM Plex Mono', monospace"
     fill="#9A9080" font-size="16" letter-spacing="4">
    <text x="94" y="92">EMS MUSCLE ACTIVATION  ·  THE 8-WEEK PROTOCOL</text>
    <text x="94" y="538">FREE SHIPPING  ·  60-NIGHT MONEY-BACK  ·  2-YEAR WARRANTY</text>
  </g>

  <!-- brass underline -->
  <rect x="92" y="500" width="320" height="2" fill="url(#brass)"/>
</svg>
